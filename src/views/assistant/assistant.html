<div class="assistant-view">
    <header class="page-head">
        <div class="ph-kicker">Assistant</div>
        <h1 class="ph-title">Talk to your <em>home.</em></h1>
        <p class="ph-lede">Hold to ask out loud — or type your request when you can't speak. Lights, climate, the forecast, your day.</p>
    </header>

    <section class="assistant-section voice-ask">
        <p class="section-title">Ask the assistant</p>
        <button
            class="voice-talk"
            :class:recording="this.voiceState === 'recording'"
            :class:busy="this.voiceState !== 'idle' && this.voiceState !== 'recording'"
            :onpointerdown="this.voiceStart()"
            :onpointerup="this.voiceStop()"
            :onpointerleave="this.voiceStop()"
            oncontextmenu="return false;"
        >
            <span class="voice-mic"><i class="iconoir-mic"></i></span>
            <span :if="this.voiceState === 'idle'">Hold to talk</span>
            <span :if="this.voiceState === 'recording'">Listening… release to send</span>
            <span :if="this.voiceState === 'transcribing'">Transcribing…</span>
            <span :if="this.voiceState === 'thinking'">Thinking…</span>
            <span :if="this.voiceState === 'speaking'">Speaking…</span>
        </button>

        <div class="ask-type-divider"><span>or type your request</span></div>

        <div class="ask-type">
            <textarea
                class="assistant-textarea"
                name="prompt"
                id="prompt"
                placeholder="e.g. Turn off the kitchen lights"
                :onkeydown="this.promptKey(event)"
                :oninput="this.promptText = event.target.value"
            >${this.promptText}</textarea>
            <button
                class="add-range-btn"
                :class:busy="this.voiceState !== 'idle'"
                :onmouseup="this.promptSend()"
            >
                <i class="iconoir-send-diagonal"></i> Send as you
            </button>
        </div>

        <div class="voice-convo" :if="this.voiceTranscript">
            <div class="voice-bubble you">
                <span class="voice-who">You</span>
                <span>${this.voiceTranscript}</span>
            </div>
            <div class="voice-bubble agent" :if="this.voiceReply">
                <span class="voice-who">Assistant</span>
                <span>${this.voiceReply}</span>
                <span class="voice-chip" :if="this.voiceAction"><i class="iconoir-flash"></i> ${this.voiceAction}</span>
            </div>
        </div>
    </section>
</div>
