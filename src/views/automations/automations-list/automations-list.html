<div class="effects-list">
    <div :foreach="group in this.groups" :key="group.name" class="effect-container">
        <div class="effect-group-head">
            <span class="eg-icon"><i :class="group.icon"></i></span>
            <strong>${group.name}</strong>
        </div>
        <div
            :foreach="effect in group.effects"
            :key="effect.sentence"
            class="effect-row"
            :class:disabled="effect.enabled === false"
        >
            <span class="effect-dot" :class:on="effect.enabled !== false"></span>
            <div class="effect-sentence" :innerHTML="effect.sentence"></div>

            <div class="effect-actions" :if="effect.id !== this.pendingDeleteId">
                <button
                    class="switch effect-switch"
                    :class:on="effect.enabled !== false"
                    :onclick="this.toggleEffect(effect)"
                    aria-label="Toggle automation"
                ><span class="knob"></span></button>
                <button class="effect-edit" :if="effect.editable" :onclick="this.editEffect(event, effect)" aria-label="Edit automation">
                    <i class="iconoir-edit-pencil"></i>
                </button>
                <button class="effect-del" :onclick="this.requestDelete(effect)" aria-label="Delete automation">
                    <i class="iconoir-trash"></i>
                </button>
            </div>

            <div class="effect-confirm" :if="effect.id === this.pendingDeleteId">
                <span class="effect-confirm-q">Delete this rule?</span>
                <button class="effect-confirm-yes" :onclick="this.confirmDelete(effect)">Delete</button>
                <button class="effect-confirm-no" :onclick="this.cancelDelete()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="effects-empty" :if="this.groups && !this.groups.length">
        <i class="iconoir-timer"></i>
        <span>No automations yet</span>
    </div>
</div>
