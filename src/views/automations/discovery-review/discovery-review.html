<div class="discovery-review">
  <div class="discovery-loading" :if="this.loading">Looking for patterns…</div>
  <div class="discovery-error" :if="this.error">${this.error}</div>

  <!-- Collapsed by default: a one-row count banner so suggestions never push the rule list + CTA
       below the fold. Tapping it expands the full review cards. -->
  <button
    class="discovery-banner"
    :if="this.rows.length"
    :onclick="this.toggleCollapsed()"
  >
    <span class="discovery-spark"><i class="iconoir-flare"></i></span>
    <span class="discovery-banner-text">
      <strong>${this.rows.length} pattern${this.rows.length === 1 ? '' : 's'} noticed</strong>
      <span class="discovery-sub">Habits the system spotted — review to automate, or dismiss.</span>
    </span>
    <span class="discovery-banner-toggle">
      ${this.collapsed ? 'Review' : 'Hide'}
      <i :class="this.collapsed ? 'iconoir-nav-arrow-down' : 'iconoir-nav-arrow-up'"></i>
    </span>
  </button>

  <div class="discovery-cards" :if="this.rows.length && !this.collapsed">
    <div :foreach="row in this.rows" :key="row.candidate.id" class="discovery-card">
      <div class="discovery-card-top">
        <span class="discovery-spark"><i class="iconoir-flare"></i></span>
        <div class="discovery-line">${row.line}</div>
      </div>

      <!-- Concrete device identity so the user can pin exactly which unit a suggestion drives — the
           prose's "the light" can't disambiguate when devices are named after their room. Reads
           trigger → action, matching the sentence order. -->
      <div class="discovery-devices" :if="row.actionDevice">
        <span class="discovery-dev discovery-dev-trigger" :if="row.triggerDevice"><i class="iconoir-antenna"></i> ${row.triggerDevice}</span>
        <span class="discovery-dev-sep" :if="row.triggerDevice"><i class="iconoir-arrow-right"></i></span>
        <span class="discovery-dev discovery-dev-action"><i class="iconoir-flash"></i> ${row.actionDevice}</span>
      </div>

      <div class="discovery-conf">
        <div class="conf-track"><div class="conf-fill" :style="{ width: row.confidencePct + '%' }"></div></div>
        <span class="conf-label"><strong>${row.confidencePct}%</strong> of the time</span>
      </div>

      <div class="discovery-meta">
        <span class="discovery-badge" :if="row.zone"><i class="iconoir-position"></i> ${row.zone}</span>
        <span class="discovery-badge"><i class="iconoir-eye-alt"></i> seen ${row.support}×</span>
        <span class="discovery-badge"><i class="iconoir-calendar"></i> ${row.days} day(s)</span>
        <span class="discovery-badge discovery-mature" :if="row.matured">established</span>
      </div>

      <div class="discovery-actions">
        <!-- :class:busy (not :disabled): bindrjs emits a bare boolean attribute even
             for a falsy value (see DESIGN.md §7), which left these buttons permanently
             disabled. The accept()/dismiss() handlers already guard on row.busy. -->
        <button class="discovery-accept" :class:busy="row.busy" :onclick="this.accept(row)"><i class="iconoir-check"></i> Automate</button>
        <button class="discovery-dismiss" :class:busy="row.busy" :onclick="this.dismiss(row)">Dismiss</button>
      </div>
    </div>
  </div>
</div>
