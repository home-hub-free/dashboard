<div id="new-automation" :if="this.data.newEffect">
    <div>
        <select
            class="dropdown"
            :oninput="this.actions.setNewEffectDevice(event.target.value, this.data.newEffect)"
        >
            <option value="null">Select device:</option>
            <option :foreach="device in this.data.devices" :key="device.id" :value="device.id">
                ${device.name}
            </option>
        </select>
    </div>

    <div :if="this.data.newEffect.device">
        <div :if="this.data.newEffect.device.type === 'boolean'">
            <select class="dropdown" :oninput="this.data.newEffect.setTo = event.target.value">
                <option value="null">Do:</option>
                <option value="true">Turn on</option>
                <option value="false">Turn off</option>
            </select>
        </div>

        <div :if="this.data.newEffect.device.type === 'value'">
            <div :if="this.data.newEffect.device.deviceCategory === 'evap-cooler'">
                <div>
                    <select class="dropdown" :oninput="this.data.newEffect.valueToSet = event.target.value">
                        <option value="null">Value to set:</option>
                        <option value="fan">Fan</option>
                        <option value="water">Water pump</option>
                    </select>
                </div>
                <div :if="this.data.newEffect.valueToSet != null">
                    <select class="dropdown" :oninput="this.data.newEffect.setTo = event.target.value">
                        <option value="null">Set to:</option>
                        <option value="true">On</option>
                        <option value="false">Off</option>
                    </select>
                </div>
            </div>

            <div :else>
                <label>Set to:</label>
                <input
                    :oninput="this.data.newEffect.setTo = (event.target.value)"
                    type="number"
                    max="100"
                    min="0"
                    placeholder="value"
                />
            </div>
        </div>
    </div>

    <div :if="this.data.newEffect.setTo !== null">
        ${this.data.newEffect.trigger ? 'When: ' : ''}
        <select class="dropdown" :oninput="this.data.newEffect.trigger = event.target.value">
            <option value="null">Based on:</option>
            <option value="time">Time of day</option>
            <option value="sensor">Sensor</option>
        </select>
    </div>

    <div :if="this.data.newEffect.trigger === 'time'">
        <input
            type="datetime"
            placeholder="Time is:"
            :oninput="this.data.newEffect.time = event.target.value;"
        />
    </div>

    <div :if="this.data.newEffect.trigger === 'sensor'">
        <select
            class="dropdown"
            :oninput="this.actions.setNewEffectSensor(event.target.value, this.data.newEffect)"
        >
            <option value="null">Select sensor:</option>
            <option :foreach="sensor in this.data.sensors" :key="sensor.id" :value="sensor.id">
                ${sensor.name + ' (' + sensor.sensorType + ')'}
            </option>
        </select>

        <div :if="this.data.newEffect.sensor">
            <select
                class="dropdown"
                :if="this.data.newEffect.sensor.sensorType === 'motion' || this.data.newEffect.sensor.sensorType === 'presence'"
                :oninput="this.data.newEffect.sensorState = (event.target.value)"
            >
                <option value="null">Is:</option>
                <option value="true">Active</option>
                <option value="false">Inactive</option>
            </select>

            <div :if="this.data.newEffect.sensor.type === 'value'">
                <div :if="this.data.newEffect.sensor.sensorType === 'temp/humidity'">
                    <select
                        class="dropdown"
                        name="check-value"
                        id="check-value"
                        :oninput="this.data.newEffect.valueToCheck = (event.target.value)"
                    >
                        <option value="null">Value to check:</option>
                        <option value="temp">Temperature</option>
                        <option value="humidity">Humidity</option>
                    </select>

                    <select
                        class="dropdown"
                        name="comparison"
                        id="comparison"
                        :oninput="this.data.newEffect.comparison = (event.target.value)"
                    >
                        <option value="null">Comparison</option>
                        <option value="higher-than">Higher Than</option>
                        <option value="lower-than">Lower Than</option>
                    </select>

                    <input
                        type="number"
                        name="temp/humidity-input"
                        placeholder="value"
                        :oninput="this.data.newEffect.sensorState = (event.target.value)"
                    />
                </div>
            </div>
        </div>

        <div :if="this.data.newEffect.sensorState !== undefined">
            <button class="add-range-btn" :onclick="this.actions.saveNewEffect(this.data.newEffect)">
                Save Automation
            </button>
        </div>
    </div>
</div>
