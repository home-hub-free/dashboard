<!-- Footage review — browse a recording camera's archived clips. Only IP cams (RTSP
     main) reach here; the entry point is hidden for face-ID cams. Day chips pick a
     local day, the segment list shows each clip + who was present, tapping one plays
     it in the <video> (signed clip URL → seekable via HTTP Range). -->
<div class="edit-container cam-rec-overlay">
    <div class="overlay-header">
        <span class="oh-icon"><i class="iconoir-clock-rotate-right"></i></span>
        <span class="oh-title">${this.data.name} · Recordings</span>
        <span class="pill" :if="this.data.zone">${this.data.zone}</span>
    </div>

    <!-- No footage at all (camera just came online, or nothing recorded yet). -->
    <div class="cam-rec-empty" :if="this.data.empty">
        <i class="iconoir-video-camera-off"></i>
        <span>No recordings yet for this camera.</span>
    </div>

    <div :else>
        <!-- Player: shows the selected clip, else a prompt. -->
        <div class="cam-rec-player">
            <video
                :if="this.data.activeClip"
                class="cam-rec-video"
                :src="this.data.activeClip"
                controls
                autoplay
                playsinline
            ></video>
            <div :else class="cam-rec-player-hint">
                <i class="iconoir-media-video"></i>
                <span>Pick a clip below to play it.</span>
            </div>
        </div>

        <!-- Day picker. -->
        <p class="section-title">Day</p>
        <div class="cam-rec-days">
            <button
                class="chip cam-rec-day"
                :foreach="day in this.data.days"
                :key="day"
                :class:active="day === this.data.selectedDay"
                :onclick="this.actions.pickDay(this.data, day)"
            >
                ${day}
            </button>
        </div>

        <!-- Segment list for the selected day. -->
        <p class="section-title">Clips</p>
        <div class="cam-rec-loading" :if="this.data.loading">Loading clips…</div>
        <div class="cam-rec-none" :if="!this.data.loading && this.data.segments.length === 0">
            No clips recorded on this day.
        </div>
        <div class="cam-rec-list" :if="!this.data.loading">
            <button
                class="cam-rec-seg"
                :foreach="seg in this.data.segments"
                :key="seg.id"
                :class:active="seg.clip === this.data.activeClip"
                :onclick="this.actions.play(this.data, seg)"
            >
                <span class="cam-rec-seg-time">
                    <i class="iconoir-play"></i> ${seg.startLabel}
                </span>
                <span class="cam-rec-seg-dur">${seg.durationLabel}</span>
                <span class="cam-rec-seg-who" :if="seg.whoLabel">
                    <i class="iconoir-group"></i> ${seg.whoLabel}
                </span>
            </button>
        </div>
    </div>
</div>
